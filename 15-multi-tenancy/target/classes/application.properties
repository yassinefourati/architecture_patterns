spring.application.name=multi-tenancy
server.port=8096

# Hibernate will run DDL against whichever tenant DataSource is currently active.
# In production, schema migrations would run per-tenant via Flyway/Liquibase
# during tenant provisioning, not on app boot.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

logging.level.com.example.tenancy=INFO
